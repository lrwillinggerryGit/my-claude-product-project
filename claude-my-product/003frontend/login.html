<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>财务管家 — 登录</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] },
          colors: {
            sakura: { DEFAULT: '#FF9EC4', light: '#FFD6E7', bg: '#FFF8FB', dim: '#F5EAF8' },
            rose:   { DEFAULT: '#FF6F91' },
          },
          borderRadius: { card: '24px', input: '16px' },
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #F9A8C2 0%, #F47FA8 50%, #F58FB0 100%);
      background-attachment: fixed;
    }
    .btn-primary { background: linear-gradient(135deg, #FF9EC4 0%, #c084fc 100%); transition: opacity .2s; }
    .btn-primary:hover { opacity: .88; }
    .input-wrap:focus-within { border-color: #FF9EC4; box-shadow: 0 0 0 3px rgba(255,158,196,.15); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center font-sans p-6">

  <!-- Branding -->
  <div class="flex flex-col items-center mb-8">
    <div class="flex items-center gap-3">
      <span class="text-4xl leading-none shrink-0">💰</span>
      <h1 class="text-3xl font-bold tracking-widest text-white drop-shadow-md">财务管家</h1>
    </div>
    <p class="text-xs font-semibold text-gray-300 uppercase tracking-widest mt-3">加入财务管家，开启智能理财之旅</p>
  </div>

  <!-- Card -->
  <div class="w-full max-w-md bg-white rounded-card shadow-xl px-10 py-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-1">欢迎回来</h2>
    <p class="text-sm text-gray-400 mb-8">请输入您的账户信息以管理财务</p>

    <form id="loginForm" class="space-y-5" onsubmit="handleLogin(event)">
      <!-- Username -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-gray-600" for="username">用户名</label>
        <div class="input-wrap relative flex items-center bg-gray-50 border border-gray-100 rounded-input px-4 transition-all">
          <svg class="w-5 h-5 text-gray-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
          </svg>
          <input id="username" type="text" placeholder="请输入用户名" required
            class="flex-1 ml-3 py-4 bg-transparent text-gray-800 placeholder-gray-300 border-0 focus:outline-none focus:ring-0 text-sm"/>
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-1.5">
        <div class="flex justify-between">
          <label class="text-sm font-semibold text-gray-600" for="password">密码</label>
          <a href="#" class="text-xs text-sakura font-medium hover:underline">忘记密码？</a>
        </div>
        <div class="input-wrap relative flex items-center bg-gray-50 border border-gray-100 rounded-input px-4 transition-all">
          <svg class="w-5 h-5 text-gray-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
          </svg>
          <input id="password" type="password" placeholder="••••••••" required
            class="flex-1 ml-3 py-4 bg-transparent text-gray-800 placeholder-gray-300 border-0 focus:outline-none focus:ring-0 text-sm"/>
          <button type="button" id="togglePwd" class="text-gray-300 hover:text-gray-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember me -->
      <div class="flex items-center gap-2">
        <input id="remember" type="checkbox" checked class="h-4 w-4 rounded border-gray-200 text-sakura focus:ring-sakura"/>
        <label for="remember" class="text-sm text-gray-500">记住我（30天内免登录）</label>
      </div>

      <button type="submit"
        class="btn-primary w-full py-4 rounded-full text-white font-bold text-base shadow-lg flex items-center justify-center gap-2">
        立即登录
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M13 7l5 5m0 0l-5 5m5-5H6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
        </svg>
      </button>
    </form>

    <p class="text-center text-sm text-gray-400 mt-6">
      还没有账号？
      <a href="register.html" class="text-sakura font-semibold hover:underline ml-1">立即注册</a>
    </p>
  </div>

  <!-- Security badge -->
  <div class="mt-8 flex items-center gap-1.5 text-xs font-semibold text-gray-300 uppercase tracking-widest">
    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
    </svg>
    银行级数据加密保护
  </div>

  <script>
    document.getElementById('togglePwd').addEventListener('click', () => {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    });

    function handleLogin(e) {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
