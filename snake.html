<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>🐍 可爱贪食蛇</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #ffe0ec 0%, #ffc2d8 50%, #ff9ec0 100%);
    font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 2px, transparent 3px),
      radial-gradient(circle at 70% 60%, rgba(255,255,255,0.3) 1px, transparent 2px),
      radial-gradient(circle at 40% 80%, rgba(255,255,255,0.4) 2px, transparent 3px),
      radial-gradient(circle at 90% 20%, rgba(255,255,255,0.3) 1px, transparent 2px);
    background-size: 200px 200px;
    pointer-events: none;
  }
  .container {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    background: rgba(255, 255, 255, 0.45);
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(220, 80, 140, 0.3);
    backdrop-filter: blur(10px);
    border: 3px solid rgba(255, 255, 255, 0.7);
    position: relative;
    z-index: 1;
  }
  .title {
    text-align: center;
    margin-bottom: 15px;
  }
  .title h1 {
    color: #c43c7a;
    font-size: 28px;
    text-shadow: 2px 2px 0 #fff, 4px 4px 8px rgba(196, 60, 122, 0.15);
    letter-spacing: 2px;
  }
  .title p {
    color: #d96aa0;
    font-size: 14px;
    margin-top: 5px;
  }
  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .game-area {
    position: relative;
    border: 5px solid #e87aae;
    border-radius: 15px;
    background: #fff0f6;
    box-shadow: inset 0 0 20px rgba(232, 122, 174, 0.2), 0 8px 20px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  canvas {
    display: block;
    background:
      linear-gradient(45deg, #fff0f6 25%, #ffe0ec 25%, #ffe0ec 50%, #fff0f6 50%, #fff0f6 75%, #ffe0ec 75%, #ffe0ec);
    background-size: 40px 40px;
  }
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 15px;
    min-width: 200px;
  }
  .panel {
    background: rgba(255, 255, 255, 0.75);
    border: 3px solid #f29ec1;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(220, 80, 140, 0.18);
  }
  .panel h3 {
    color: #c43c7a;
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .panel .value {
    font-size: 32px;
    font-weight: bold;
    color: #d63838;
    text-shadow: 2px 2px 0 #fff;
  }
  .controls {
    background: rgba(255, 255, 255, 0.75);
    border: 3px solid #f29ec1;
    border-radius: 15px;
    padding: 15px;
    color: #c43c7a;
    font-size: 13px;
    line-height: 1.9;
  }
  .controls h3 {
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  kbd {
    background: linear-gradient(180deg, #fff, #ffe0ec);
    border: 2px solid #f29ec1;
    border-radius: 6px;
    padding: 2px 8px;
    font-family: 'Comic Sans MS', monospace;
    color: #c43c7a;
    font-weight: bold;
    box-shadow: 0 2px 0 #e87aae;
    display: inline-block;
    min-width: 22px;
    text-align: center;
  }
  button {
    background: linear-gradient(135deg, #ffaad0, #e87aae);
    color: white;
    border: 3px solid #fff;
    padding: 12px 20px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    font-family: inherit;
    letter-spacing: 2px;
    box-shadow: 0 5px 0 #c43c7a, 0 8px 15px rgba(196, 60, 122, 0.25);
    transition: all 0.1s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #c43c7a, 0 10px 18px rgba(196, 60, 122, 0.3); }
  button:active { transform: translateY(3px); box-shadow: 0 2px 0 #c43c7a, 0 4px 8px rgba(196, 60, 122, 0.25); }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(255, 240, 246, 0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-radius: 10px;
    z-index: 10;
  }
  .overlay h2 {
    color: #d63838;
    font-size: 36px;
    margin-bottom: 10px;
    text-shadow: 3px 3px 0 #fff;
    animation: bounce 1s infinite;
  }
  .overlay p {
    color: #c43c7a;
    font-size: 18px;
    margin: 5px 0;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .difficulty {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-top: 8px;
  }
  .difficulty button {
    flex: 1;
    padding: 6px 8px;
    font-size: 12px;
    letter-spacing: 1px;
    box-shadow: 0 3px 0 #c43c7a;
  }
  .difficulty button.active {
    background: linear-gradient(135deg, #d63838, #a82929);
    box-shadow: 0 3px 0 #6a1818;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="game-wrapper">
      <div class="title">
        <h1>🐍 可爱贪食蛇 🍌</h1>
        <p>~ 让我们一起愉快地吃香蕉吧 ~</p>
      </div>
      <div class="game-area">
        <canvas id="game" width="500" height="500"></canvas>
        <div class="overlay" id="overlay">
          <h2 id="overlay-title">游戏结束 !</h2>
          <p>本次得分: <span id="final-score" style="color:#d63838;font-weight:bold;font-size:24px;">0</span></p>
          <p style="margin-top:15px;font-size:14px;">按 <kbd style="display:inline;">空格</kbd> 重新开始</p>
        </div>
      </div>
    </div>
    <div class="sidebar">
      <div class="panel">
        <h3>🍌 分数</h3>
        <div class="value" id="score">0</div>
      </div>
      <div class="panel">
        <h3>🏆 最高分</h3>
        <div class="value" id="best">0</div>
      </div>
      <div class="panel">
        <h3>📏 蛇身长度</h3>
        <div class="value" id="length">3</div>
      </div>
      <div class="panel">
        <h3>⚡ 难度</h3>
        <div class="difficulty">
          <button data-speed="180" class="active">简单</button>
          <button data-speed="120">普通</button>
          <button data-speed="70">困难</button>
        </div>
      </div>
      <div class="controls">
        <h3>🎮 操作说明</h3>
        <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 控制方向<br>
        <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 同上<br>
        <kbd>空格</kbd> 暂停 / 开始<br>
        <kbd>R</kbd> 重新开始
      </div>
      <button onclick="restart()">🔄 重新开始</button>
    </div>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 25;          // 单元格大小
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, best, speed, gameLoop, isPaused, isGameOver;
let foodPulse = 0;
let snakeAnim = 0;

best = parseInt(localStorage.getItem('snake_best') || '0');
document.getElementById('best').textContent = best;

function init() {
  snake = [
    {x: 10, y: 10},
    {x: 9, y: 10},
    {x: 8, y: 10}
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  isPaused = false;
  isGameOver = false;
  placeFood();
  updateUI();
  document.getElementById('overlay').style.display = 'none';
}

function placeFood() {
  while (true) {
    const fx = Math.floor(Math.random() * COLS);
    const fy = Math.floor(Math.random() * ROWS);
    if (!snake.some(s => s.x === fx && s.y === fy)) {
      food = {x: fx, y: fy};
      return;
    }
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('length').textContent = snake.length;
}

// 绘制可爱香蕉
function drawFood() {
  foodPulse += 0.1;
  const pulse = Math.sin(foodPulse) * 1.5;
  const cx = food.x * GRID + GRID / 2;
  const cy = food.y * GRID + GRID / 2;

  ctx.save();
  ctx.translate(cx, cy);
  // 轻微摇摆动画
  ctx.rotate(Math.sin(foodPulse * 0.6) * 0.08 - Math.PI / 6);

  const w = GRID - 6 + pulse * 0.4; // 香蕉长度
  const h = GRID / 2 - 1;            // 香蕉粗细

  // 香蕉阴影
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.beginPath();
  ctx.ellipse(2, h + 3, w / 2.2, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // 香蕉本体（用二次贝塞尔画弯弯的形状）
  const grad = ctx.createLinearGradient(0, -h, 0, h);
  grad.addColorStop(0, '#fff4a3');
  grad.addColorStop(0.5, '#ffd93d');
  grad.addColorStop(1, '#f4a623');
  ctx.fillStyle = grad;
  ctx.strokeStyle = '#c98410';
  ctx.lineWidth = 1.2;

  ctx.beginPath();
  // 上弧线（从左尖端到右尖端）
  ctx.moveTo(-w / 2, h / 3);
  ctx.quadraticCurveTo(0, -h - 2, w / 2, h / 3);
  // 下弧线
  ctx.quadraticCurveTo(0, h / 2, -w / 2, h / 3);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // 香蕉高光
  ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
  ctx.beginPath();
  ctx.ellipse(-1, -h / 2 + 1, w / 3.5, 1.5, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // 左端蒂头（棕色）
  ctx.fillStyle = '#6b4423';
  ctx.beginPath();
  ctx.arc(-w / 2 + 1, h / 3, 2, 0, Math.PI * 2);
  ctx.fill();

  // 右端尖头（深棕色）
  ctx.fillStyle = '#8b5a2b';
  ctx.beginPath();
  ctx.arc(w / 2 - 1, h / 3, 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// 绘制可爱小蛇
function drawSnake() {
  snakeAnim += 0.15;

  // 身体段（从尾巴到头）
  for (let i = snake.length - 1; i > 0; i--) {
    const seg = snake[i];
    const cx = seg.x * GRID + GRID / 2;
    const cy = seg.y * GRID + GRID / 2;
    // 渐变红色：靠近头部更鲜艳
    const ratio = i / snake.length;
    const r = Math.floor(214 - ratio * 60);
    const g = Math.floor(56 - ratio * 20);
    const b = Math.floor(56 - ratio * 20);

    // 阴影
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.beginPath();
    ctx.arc(cx + 2, cy + 2, GRID/2 - 2, 0, Math.PI * 2);
    ctx.fill();

    // 身体
    const grad = ctx.createRadialGradient(cx - 3, cy - 3, 2, cx, cy, GRID/2);
    grad.addColorStop(0, `rgb(${r+30},${g+20},${b+20})`);
    grad.addColorStop(1, `rgb(${r},${g},${b})`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, GRID/2 - 2, 0, Math.PI * 2);
    ctx.fill();

    // 鳞片小圆点
    ctx.fillStyle = 'rgba(255, 200, 200, 0.5)';
    ctx.beginPath();
    ctx.arc(cx - 3, cy - 3, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // 蛇头
  const head = snake[0];
  const hx = head.x * GRID + GRID / 2;
  const hy = head.y * GRID + GRID / 2;

  // 头部阴影
  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
  ctx.beginPath();
  ctx.arc(hx + 2, hy + 2, GRID/2, 0, Math.PI * 2);
  ctx.fill();

  // 头部本体
  const headGrad = ctx.createRadialGradient(hx - 4, hy - 4, 3, hx, hy, GRID/2);
  headGrad.addColorStop(0, '#ff7070');
  headGrad.addColorStop(1, '#d63838');
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.arc(hx, hy, GRID/2, 0, Math.PI * 2);
  ctx.fill();

  // 计算眼睛位置（根据方向）
  const eyeOffset = 4;
  const eyeR = 4;
  let e1x, e1y, e2x, e2y;
  if (dir.x === 1) { // 向右
    e1x = hx + 3; e1y = hy - eyeOffset;
    e2x = hx + 3; e2y = hy + eyeOffset;
  } else if (dir.x === -1) { // 向左
    e1x = hx - 3; e1y = hy - eyeOffset;
    e2x = hx - 3; e2y = hy + eyeOffset;
  } else if (dir.y === -1) { // 向上
    e1x = hx - eyeOffset; e1y = hy - 3;
    e2x = hx + eyeOffset; e2y = hy - 3;
  } else { // 向下
    e1x = hx - eyeOffset; e1y = hy + 3;
    e2x = hx + eyeOffset; e2y = hy + 3;
  }

  // 眼白
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(e1x, e1y, eyeR, 0, Math.PI * 2);
  ctx.arc(e2x, e2y, eyeR, 0, Math.PI * 2);
  ctx.fill();

  // 眼珠（眨眼动画）
  const blink = Math.sin(snakeAnim * 0.3) > 0.95;
  if (!blink) {
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(e1x + dir.x, e1y + dir.y, 2.5, 0, Math.PI * 2);
    ctx.arc(e2x + dir.x, e2y + dir.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // 眼睛高光
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e1x + dir.x - 0.5, e1y + dir.y - 0.5, 0.8, 0, Math.PI * 2);
    ctx.arc(e2x + dir.x - 0.5, e2y + dir.y - 0.5, 0.8, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // 闭眼
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(e1x - 3, e1y); ctx.lineTo(e1x + 3, e1y);
    ctx.moveTo(e2x - 3, e2y); ctx.lineTo(e2x + 3, e2y);
    ctx.stroke();
  }

  // 腮红
  ctx.fillStyle = 'rgba(255, 150, 180, 0.6)';
  ctx.beginPath();
  if (dir.x !== 0) {
    ctx.arc(hx - dir.x * 2, hy - 7, 2, 0, Math.PI * 2);
    ctx.arc(hx - dir.x * 2, hy + 7, 2, 0, Math.PI * 2);
  } else {
    ctx.arc(hx - 7, hy - dir.y * 2, 2, 0, Math.PI * 2);
    ctx.arc(hx + 7, hy - dir.y * 2, 2, 0, Math.PI * 2);
  }
  ctx.fill();

  // 吐舌头（偶尔）
  if (Math.sin(snakeAnim) > 0.7) {
    ctx.strokeStyle = '#ff3060';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const tongueLen = 8;
    ctx.moveTo(hx + dir.x * (GRID/2), hy + dir.y * (GRID/2));
    ctx.lineTo(hx + dir.x * (GRID/2 + tongueLen), hy + dir.y * (GRID/2 + tongueLen));
    ctx.stroke();
    // 分叉
    ctx.beginPath();
    ctx.moveTo(hx + dir.x * (GRID/2 + tongueLen), hy + dir.y * (GRID/2 + tongueLen));
    ctx.lineTo(hx + dir.x * (GRID/2 + tongueLen + 3) + dir.y * 3, hy + dir.y * (GRID/2 + tongueLen + 3) + dir.x * 3);
    ctx.moveTo(hx + dir.x * (GRID/2 + tongueLen), hy + dir.y * (GRID/2 + tongueLen));
    ctx.lineTo(hx + dir.x * (GRID/2 + tongueLen + 3) - dir.y * 3, hy + dir.y * (GRID/2 + tongueLen + 3) - dir.x * 3);
    ctx.stroke();
  }
}

function update() {
  if (isPaused || isGameOver) return;

  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // 撞墙
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver();
    return;
  }
  // 撞自己
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  // 吃到苹果
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > best) {
      best = score;
      localStorage.setItem('snake_best', best);
      document.getElementById('best').textContent = best;
    }
    placeFood();
  } else {
    snake.pop();
  }
  updateUI();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawFood();
  drawSnake();

  if (isPaused && !isGameOver) {
    ctx.fillStyle = 'rgba(255, 240, 246, 0.75)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#c43c7a';
    ctx.font = 'bold 48px Comic Sans MS';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停中', canvas.width / 2, canvas.height / 2);
    ctx.font = '18px Comic Sans MS';
    ctx.fillText('按空格继续', canvas.width / 2, canvas.height / 2 + 40);
  }
}

function gameOver() {
  isGameOver = true;
  document.getElementById('final-score').textContent = score;
  document.getElementById('overlay').style.display = 'flex';
}

function restart() {
  clearInterval(gameLoop);
  init();
  startLoop();
}

function startLoop() {
  gameLoop = setInterval(() => {
    update();
    draw();
  }, speed);
}

// 难度切换
document.querySelectorAll('.difficulty button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    speed = parseInt(btn.dataset.speed);
    clearInterval(gameLoop);
    startLoop();
  });
});

// 键盘控制
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === ' ') {
    if (isGameOver) restart();
    else isPaused = !isPaused;
    e.preventDefault();
    return;
  }
  if (key === 'r') { restart(); return; }
  if (isGameOver || isPaused) return;

  const map = {
    'arrowup': {x: 0, y: -1}, 'w': {x: 0, y: -1},
    'arrowdown': {x: 0, y: 1}, 's': {x: 0, y: 1},
    'arrowleft': {x: -1, y: 0}, 'a': {x: -1, y: 0},
    'arrowright': {x: 1, y: 0}, 'd': {x: 1, y: 0}
  };

  if (map[key]) {
    const newDir = map[key];
    // 不能反向移动
    if (newDir.x !== -dir.x || newDir.y !== -dir.y) {
      nextDir = newDir;
    }
    e.preventDefault();
  }
});

// 启动游戏
speed = 180;
init();
startLoop();

// 让画面动画流畅（即使逻辑没更新也重绘以保持动画）
function animationLoop() {
  if (!isPaused && !isGameOver) draw();
  requestAnimationFrame(animationLoop);
}
animationLoop();
</script>
</body>
</html>
